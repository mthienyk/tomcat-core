name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Scaleway registry
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login rg.fr-par.scw.cloud -u nologin --password-stdin

      - name: Build and push
        id: meta
        run: |
          TAG="$(echo "${{ github.sha }}" | cut -c1-7)"
          IMAGE="rg.fr-par.scw.cloud/tomcat-core/api:${TAG}"
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install Scaleway CLI
        run: |
          curl -sSL https://github.com/scaleway/scaleway-cli/releases/download/v2.56.0/scw-linux-x86_64 -o scw
          chmod +x scw
          sudo mv scw /usr/local/bin/scw

      - name: Configure Scaleway
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_REGION: ${{ secrets.SCW_DEFAULT_REGION }}
        run: |
          ORG_ID="$(curl -sS -H "X-Auth-Token: ${SCW_SECRET_KEY}" \
            "https://api.scaleway.com/account/v3/projects/${SCW_DEFAULT_PROJECT_ID}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['organization_id'])")"
          mkdir -p ~/.config/scw
          cat > ~/.config/scw/config.yaml <<EOF
          access_key: ${SCW_ACCESS_KEY}
          secret_key: ${SCW_SECRET_KEY}
          default_organization_id: ${ORG_ID}
          default_project_id: ${SCW_DEFAULT_PROJECT_ID}
          default_region: ${SCW_DEFAULT_REGION}
          default_zone: fr-par-1
          EOF

      - name: Update container image
        env:
          SCW_CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}
          IMAGE: ${{ needs.build.outputs.image }}
          SCW_DEFAULT_REGION: ${{ secrets.SCW_DEFAULT_REGION }}
        run: |
          scw container container update "$SCW_CONTAINER_ID" image="$IMAGE" region="$SCW_DEFAULT_REGION" -w
          for i in $(seq 1 60); do
            STATUS="$(scw container container get "$SCW_CONTAINER_ID" region="$SCW_DEFAULT_REGION" -o json \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('status',''))")"
            echo "status=$STATUS"
            if [[ "$STATUS" == "ready" ]]; then
              exit 0
            fi
            sleep 5
          done
          echo "Container not ready after 5 minutes" >&2
          exit 1

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Install Scaleway CLI
        run: |
          curl -sSL https://github.com/scaleway/scaleway-cli/releases/download/v2.56.0/scw-linux-x86_64 -o scw
          chmod +x scw
          sudo mv scw /usr/local/bin/scw

      - name: Configure Scaleway
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_REGION: ${{ secrets.SCW_DEFAULT_REGION }}
        run: |
          ORG_ID="$(curl -sS -H "X-Auth-Token: ${SCW_SECRET_KEY}" \
            "https://api.scaleway.com/account/v3/projects/${SCW_DEFAULT_PROJECT_ID}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['organization_id'])")"
          mkdir -p ~/.config/scw
          cat > ~/.config/scw/config.yaml <<EOF
          access_key: ${SCW_ACCESS_KEY}
          secret_key: ${SCW_SECRET_KEY}
          default_organization_id: ${ORG_ID}
          default_project_id: ${SCW_DEFAULT_PROJECT_ID}
          default_region: ${SCW_DEFAULT_REGION}
          default_zone: fr-par-1
          EOF

      - name: Smoke test readiness
        env:
          SCW_CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}
          SCW_DEFAULT_REGION: ${{ secrets.SCW_DEFAULT_REGION }}
        run: |
          DOMAIN="$(scw container container get "$SCW_CONTAINER_ID" region="$SCW_DEFAULT_REGION" -o json \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('domain_name',''))")"
          URL="https://${DOMAIN}/health/readiness"
          echo "GET $URL"
          for i in $(seq 1 6); do
            CODE="$(curl -sS -o /tmp/readiness.json -w "%{http_code}" --max-time 30 "$URL" || true)"
            echo "attempt $i: HTTP $CODE"
            cat /tmp/readiness.json || true
            if [[ "$CODE" == "200" ]]; then
              exit 0
            fi
            sleep 10
          done
          exit 1
